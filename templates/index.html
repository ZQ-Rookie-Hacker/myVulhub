<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Vulhub Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="/static/style.css" rel="stylesheet" />
</head>
<body>
  <div class="container" style="max-width:1200px;margin:32px auto;padding:0 16px;">
    <div class="header">
      <div class="title" style="font-size:36px;font-weight:800;display:flex;align-items:center;gap:12px;">🐳 Vulhub Manager</div>
      <div style="display:flex;gap:8px;">
        <button id="btnGitSync" class="btn btn-primary">🔄 Git 同步</button>
        <button id="btnRescan" class="btn btn-primary">🔄 重新扫描</button>
      </div>
    </div>

    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="搜索 CVE、名称或分类..." style="flex:1 1 500px" />
      <select id="categoryFilter">
        <option value="">所有分类</option>
      </select>

      <label class="checkbox">
        <input id="exploitFilter" type="checkbox" /> 含Exploit
      </label>
      <label class="checkbox">
        <input id="runningFilter" type="checkbox" /> 运行中
      </label>
      <label class="checkbox">
        <input id="downloadedFilter" type="checkbox" /> 已有镜像
      </label>

      <div style="display:flex;align-items:center;gap:8px;margin-left:auto;padding:4px 12px;background:#f0f4ff;border-radius:10px;border:1px solid #d4d4f7;">
        <span style="font-size:13px;color:#6366f1;font-weight:600;white-space:nowrap;">📂 Vulhub:</span>
        <span id="vulhubPathDisplay" style="font-size:12px;color:#334155;font-family:monospace;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
        <button id="btnChangePath" class="btn" style="height:30px;padding:0 10px;font-size:12px;">更改</button>
      </div>
    </div>

    <div id="stats" class="stats"></div>
    <div class="env-list" id="envList"></div>
    <div id="pagination" class="pagination"></div>
  </div>

  <!-- 详情 Modal -->
  <div id="detailModal" class="modal" style="z-index:9998;">
    <div class="modal-content">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 style="margin:0;">环境详情</h3>
        <button class="btn" onclick="closeModal()">关闭</button>
      </div>
      <div id="modalContent" style="margin-top:10px;"></div>
    </div>
  </div>

  <!-- 下载进度 Modal -->
  <div id="progressModal" class="modal" style="z-index:9997;">
    <div class="modal-content">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 style="margin:0;">下载镜像</h3>
        <button class="btn" onclick="hideProgressModal()">关闭</button>
      </div>
      <pre id="progressLog"></pre>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="loading-box">处理中...</div>
  </div>

  <!-- JS 按依赖顺序加载 -->
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/core.js"></script>
  <script src="/static/js/env.js"></script>
  <script src="/static/js/git.js"></script>
</body>
</html>
