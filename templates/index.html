<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Vulhub Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="/static/style.css" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">
        <span>[<span class="neon-diamond">◆</span>]</span>
        <span>漏洞环境管理</span>
        <span class="cursor-blink"></span>
      </div>
      <div class="header-actions">
        <button id="btnGitSync" type="button" class="btn btn-primary">Git 同步</button>
        <button id="btnRescan" type="button" class="btn btn-primary">重新扫描</button>
      </div>
    </div>

    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="搜索 CVE、名称或分类..." />
      <select id="categoryFilter" title="筛选分类">
        <option value="">所有分类</option>
      </select>

      <label class="checkbox">
        <input id="exploitFilter" type="checkbox" /> 含Exploit
      </label>
      <label class="checkbox">
        <input id="runningFilter" type="checkbox" /> 运行中
      </label>
      <label class="checkbox">
        <input id="downloadedFilter" type="checkbox" /> 已有镜像
      </label>

      <div class="path-bar">
        <span class="path-label">Vulhub:</span>
        <span id="vulhubPathDisplay" class="path-value"></span>
        <button id="btnChangePath" type="button" class="btn">更改</button>
      </div>
    </div>

    <div id="stats" class="stats"></div>
    <div class="env-list" id="envList"></div>
    <div id="pagination" class="pagination"></div>
  </div>

  <!-- 详情 Modal -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>环境详情</h3>
        <button type="button" class="btn" onclick="closeModal()">关闭</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- 下载进度 Modal -->
  <div id="progressModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>下载镜像</h3>
        <button type="button" class="btn" onclick="hideProgressModal()">关闭</button>
      </div>
      <pre id="progressLog"></pre>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="loading-box">处理中...</div>
  </div>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/core.js"></script>
  <script src="/static/js/env.js"></script>
  <script src="/static/js/git.js"></script>
</body>
</html>
